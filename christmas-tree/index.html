<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎄 3D Christmas Tree</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000005 100%);
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    canvas { display: block; }
    #title {
      position: fixed;
      top: 28px;
      width: 100%;
      text-align: center;
      color: #ffd700;
      font-size: 1.8rem;
      letter-spacing: 4px;
      text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00, 0 0 60px #ff4500;
      animation: titleGlow 3s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 10;
    }
    @keyframes titleGlow {
      from { text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00, 0 0 60px #ff4500; opacity: 0.9; }
      to   { text-shadow: 0 0 30px #fff700, 0 0 60px #ff8c00, 0 0 90px #ff4500; opacity: 1; }
    }
    #hint {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: rgba(200,220,255,0.5);
      font-size: 0.85rem;
      pointer-events: none;
      z-index: 10;
    }
    #tree-info {
      position: fixed;
      top: 75px;
      width: 100%;
      text-align: center;
      color: rgba(180,210,255,0.6);
      font-size: 0.8rem;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="title">🎄 Merry Christmas 🎄</div>
  <div id="tree-info">🖱️ Drag to rotate &nbsp;|&nbsp; Scroll to zoom</div>
  <div id="hint">✨ Happy Holidays ✨</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Scene Setup ───────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000510, 0.018);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 6, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 8;
    controls.maxDistance = 35;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.target.set(0, 3.5, 0);
    controls.update();

    // ─── Lighting ───────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0x1a2a4a, 0.6);
    scene.add(ambient);

    const starLight = new THREE.PointLight(0xffd700, 3, 30);
    starLight.position.set(0, 11, 0);
    starLight.castShadow = true;
    scene.add(starLight);

    const warmLight = new THREE.PointLight(0xff6622, 1.5, 20);
    warmLight.position.set(4, 3, 4);
    scene.add(warmLight);

    const coolLight = new THREE.PointLight(0x2266ff, 1.0, 20);
    coolLight.position.set(-4, 2, -4);
    scene.add(coolLight);

    const groundLight = new THREE.PointLight(0x88aaff, 0.5, 15);
    groundLight.position.set(0, 0.5, 0);
    scene.add(groundLight);

    // ─── Materials ──────────────────────────────────────────────────
    const trunkMat  = new THREE.MeshStandardMaterial({ color: 0x5c3317, roughness: 0.9, metalness: 0.0 });
    const treeMatA  = new THREE.MeshStandardMaterial({ color: 0x0d4d0d, roughness: 0.8, metalness: 0.05 });
    const treeMatB  = new THREE.MeshStandardMaterial({ color: 0x166b16, roughness: 0.8, metalness: 0.05 });
    const treeMatC  = new THREE.MeshStandardMaterial({ color: 0x1f8a1f, roughness: 0.8, metalness: 0.05 });
    const snowMat   = new THREE.MeshStandardMaterial({ color: 0xddeeff, roughness: 0.3, metalness: 0.1, transparent: true, opacity: 0.85 });
    const starMat   = new THREE.MeshStandardMaterial({ color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 2.5, roughness: 0.2, metalness: 0.8 });
    const ornamentMats = [
      new THREE.MeshStandardMaterial({ color: 0xff2222, roughness: 0.2, metalness: 0.6, emissive: 0x441111 }),
      new THREE.MeshStandardMaterial({ color: 0x2255ff, roughness: 0.2, metalness: 0.6, emissive: 0x112244 }),
      new THREE.MeshStandardMaterial({ color: 0xff22ff, roughness: 0.2, metalness: 0.6, emissive: 0x441144 }),
      new THREE.MeshStandardMaterial({ color: 0x22ffaa, roughness: 0.2, metalness: 0.6, emissive: 0x114433 }),
      new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.2, metalness: 0.6, emissive: 0x443311 }),
      new THREE.MeshStandardMaterial({ color: 0x00ccff, roughness: 0.2, metalness: 0.6, emissive: 0x112233 }),
    ];

    // ─── Tree ───────────────────────────────────────────────────────
    const treeGroup = new THREE.Group();

    // Trunk
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.5, 1.5, 12), trunkMat);
    trunk.position.y = 0.75;
    trunk.castShadow = true;
    treeGroup.add(trunk);

    // Tree layers (cone shape)
    const layers = [
      { r: 2.8, h: 3.2, y: 2.6, mat: treeMatA, segments: 12 },
      { r: 2.2, h: 2.8, y: 4.8, mat: treeMatB, segments: 12 },
      { r: 1.6, h: 2.5, y: 6.7, mat: treeMatC, segments: 12 },
      { r: 1.0, h: 2.2, y: 8.4, mat: treeMatA, segments: 12 },
    ];
    layers.forEach(l => {
      const geo = new THREE.ConeGeometry(l.r, l.h, l.segments);
      const mesh = new THREE.Mesh(geo, l.mat);
      mesh.position.y = l.y;
      mesh.castShadow = true;
      treeGroup.add(mesh);
    });

    // ─── Star ───────────────────────────────────────────────────────
    const starGeo = new THREE.OctahedronGeometry(0.45, 0);
    const starMesh = new THREE.Mesh(starGeo, starMat);
    starMesh.position.y = 10.0;
    starMesh.rotation.y = Math.PI / 4;
    treeGroup.add(starMesh);

    // ─── Ornaments ──────────────────────────────────────────────────
    const ornamentGeo = new THREE.SphereGeometry(0.2, 14, 14);

    const ornamentPositions = [
      // Bottom layer
      [1.8, 1.6, 1.5], [-1.5, 1.8, 1.2], [0.5, 1.5, -2.0], [-0.8, 2.0, -1.5], [1.2, 2.2, -1.0],
      // 2nd layer
      [1.5, 3.5, 1.0], [-1.2, 3.8, 0.8], [0.3, 3.4, -1.6], [-0.5, 4.0, 0.5], [1.0, 3.6, -1.2],
      [0.8, 3.2, 1.5], [-1.0, 3.5, -1.0],
      // 3rd layer
      [1.0, 5.5, 0.6], [-0.8, 5.8, 0.4], [0.2, 5.4, -1.1], [-0.3, 6.0, 0.2], [0.7, 5.6, -0.5],
      [0.4, 5.2, 0.9], [-0.6, 5.5, -0.7],
      // Top layer
      [0.6, 7.5, 0.3], [-0.4, 7.8, 0.2], [0.1, 7.4, -0.7], [0.3, 7.6, 0.5],
    ];

    const ornamentObjects = [];
    ornamentPositions.forEach((pos, i) => {
      const mat = ornamentMats[i % ornamentMats.length];
      const mesh = new THREE.Mesh(ornamentGeo, mat);
      mesh.position.set(...pos);
      const scale = 0.8 + Math.random() * 0.5;
      mesh.scale.setScalar(scale);
      mesh.castShadow = true;
      treeGroup.add(mesh);
      ornamentObjects.push({ mesh, baseIntensity: 0.5 + Math.random(), phase: Math.random() * Math.PI * 2 });
    });

    // Ornament hooks (thin wire)
    ornamentPositions.forEach((pos) => {
      const hookGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.25, 4);
      const hookMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 });
      const hook = new THREE.Mesh(hookGeo, hookMat);
      hook.position.set(pos[0], pos[1] + 0.28, pos[2]);
      treeGroup.add(hook);
    });

    // ─── Lights (bulbs on tree) ─────────────────────────────────────
    const lightBulbGeo = new THREE.SphereGeometry(0.07, 8, 8);
    const lightColors = [0xff3333, 0x33ff33, 0x3333ff, 0xffff33, 0xff33ff, 0x33ffff, 0xffaa00];
    const lightBulbMatts = lightColors.map(c => new THREE.MeshStandardMaterial({
      color: c, emissive: c, emissiveIntensity: 2.0, roughness: 0.1, metalness: 0.0,
    }));
    const lightBulbObjects = [];

    // Spiral lights around tree
    for (let layer = 0; layer < 4; layer++) {
      const count = 8 + layer * 4;
      const yBase = 1.8 + layer * 2.2;
      const rBase = 2.2 - layer * 0.5;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + layer * 0.4;
        const r = rBase + (Math.random() - 0.5) * 0.3;
        const y = yBase + (Math.random() - 0.5) * 1.2;
        const mat = lightBulbMatts[i % lightColors.length];
        const bulb = new THREE.Mesh(lightBulbGeo, mat);
        bulb.position.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
        treeGroup.add(bulb);
        lightBulbObjects.push({ mesh: bulb, mat, color: lightColors[i % lightColors.length], phase: Math.random() * Math.PI * 2 });
      }
    }

    // ─── Snow Ground ────────────────────────────────────────────────
    const groundGeo = new THREE.CylinderGeometry(6, 6, 0.3, 32);
    const ground = new THREE.Mesh(groundGeo, snowMat);
    ground.position.y = 0.15;
    ground.receiveShadow = true;
    scene.add(ground);

    // Snow mounds
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const r = 3 + Math.random() * 2;
      const moundGeo = new THREE.SphereGeometry(0.4 + Math.random() * 0.5, 12, 12);
      const mound = new THREE.Mesh(moundGeo, snowMat);
      mound.position.set(Math.cos(angle) * r, 0.2, Math.sin(angle) * r);
      mound.scale.y = 0.5;
      mound.receiveShadow = true;
      scene.add(mound);
    }

    // ─── Gifts ──────────────────────────────────────────────────────
    const giftConfigs = [
      { x: -1.8, z: 1.0, w: 0.8, h: 0.7, c: 0xe74c3c, ribbon: 0xf1c40f },
      { x:  1.5, z: 1.2, w: 0.6, h: 0.5, c: 0x3498db, ribbon: 0xf1c40f },
      { x: -2.2, z: 0.3, w: 0.5, h: 0.45, c: 0x9b59b6, ribbon: 0xe74c3c },
      { x:  2.0, z: 0.5, w: 0.7, h: 0.6, c: 0x2ecc71, ribbon: 0xf1c40f },
      { x:  0.5, z: 2.0, w: 0.55, h: 0.5, c: 0xe67e22, ribbon: 0xf1c40f },
      { x: -0.8, z: 2.2, w: 0.45, h: 0.4, c: 0x1abc9c, ribbon: 0xe74c3c },
      { x:  2.5, z:-0.5, w: 0.5, h: 0.45, c: 0xf39c12, ribbon: 0x3498db },
    ];

    giftConfigs.forEach(cfg => {
      const boxGeo = new THREE.BoxGeometry(cfg.w, cfg.h, cfg.w);
      const boxMat = new THREE.MeshStandardMaterial({ color: cfg.c, roughness: 0.5, metalness: 0.1 });
      const box = new THREE.Mesh(boxGeo, boxMat);
      box.position.set(cfg.x, cfg.h / 2, cfg.z);
      box.rotation.y = Math.random() * 0.5 - 0.25;
      box.castShadow = true;
      scene.add(box);

      // Ribbon cross
      const ribH = new THREE.Mesh(new THREE.BoxGeometry(cfg.w + 0.02, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: cfg.ribbon, metalness: 0.5 }));
      const ribV = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, cfg.w + 0.02), new THREE.MeshStandardMaterial({ color: cfg.ribbon, metalness: 0.5 }));
      ribH.position.set(cfg.x, cfg.h + 0.04, cfg.z);
      ribV.position.set(cfg.x, cfg.h + 0.04, cfg.z);
      ribH.rotation.y = box.rotation.y;
      ribV.rotation.y = box.rotation.y;
      scene.add(ribH);
      scene.add(ribV);

      // Bow
      const bowGeo = new THREE.SphereGeometry(0.1, 8, 8);
      const bowMat = new THREE.MeshStandardMaterial({ color: cfg.ribbon, roughness: 0.4, metalness: 0.3 });
      const bow = new THREE.Mesh(bowGeo, bowMat);
      bow.position.set(cfg.x, cfg.h + 0.12, cfg.z);
      scene.add(bow);
    });

    scene.add(treeGroup);

    // ─── Snow Particles ─────────────────────────────────────────────
    const SNOW_COUNT = 3000;
    const snowGeo = new THREE.BufferGeometry();
    const snowPositions = new Float32Array(SNOW_COUNT * 3);
    const snowSizes = new Float32Array(SNOW_COUNT);
    const snowPhases = new Float32Array(SNOW_COUNT);

    for (let i = 0; i < SNOW_COUNT; i++) {
      snowPositions[i * 3]     = (Math.random() - 0.5) * 40;
      snowPositions[i * 3 + 1] = Math.random() * 25;
      snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
      snowSizes[i]  = Math.random() * 3 + 1;
      snowPhases[i] = Math.random() * Math.PI * 2;
    }
    snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
    snowGeo.setAttribute('size', new THREE.BufferAttribute(snowSizes, 1));

    const snowMattr = new THREE.PointsMaterial({
      color: 0xddeeff, size: 0.12, transparent: true, opacity: 0.7,
      sizeAttenuation: true, depthWrite: false,
    });
    const snowParticles = new THREE.Points(snowGeo, snowMattr);
    scene.add(snowParticles);

    // ─── Background Stars ───────────────────────────────────────────
    const BG_STAR_COUNT = 1500;
    const bgGeo = new THREE.BufferGeometry();
    const bgPos = new Float32Array(BG_STAR_COUNT * 3);
    for (let i = 0; i < BG_STAR_COUNT; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 80 + Math.random() * 20;
      bgPos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
      bgPos[i * 3 + 1] = Math.abs(r * Math.cos(phi)); // upper hemisphere
      bgPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    }
    bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
    const bgStars = new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.8 }));
    scene.add(bgStars);

    // ─── Animation ──────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Star rotation & pulse
      starMesh.rotation.y += 0.008;
      starMesh.scale.setScalar(1 + Math.sin(t * 2) * 0.08);
      starLight.intensity = 2.5 + Math.sin(t * 1.5) * 0.8;

      // Ornaments twinkle
      ornamentObjects.forEach(({ mesh, baseIntensity, phase }) => {
        const mat = mesh.material;
        mat.emissiveIntensity = baseIntensity * (0.5 + 0.5 * Math.sin(t * 2 + phase));
      });

      // Light bulbs flash in sequence
      lightBulbObjects.forEach(({ mat, phase }, i) => {
        const synced = Math.sin(t * 3 + phase + i * 0.3);
        mat.emissiveIntensity = synced > 0 ? 2.0 : 0.1;
      });

      // Warm & cool light pulse
      warmLight.intensity = 1.2 + Math.sin(t * 0.8) * 0.4;
      coolLight.intensity = 0.8 + Math.sin(t * 1.1 + 1) * 0.3;

      // Snow falling
      const positions = snowGeo.attributes.position.array;
      for (let i = 0; i < SNOW_COUNT; i++) {
        positions[i * 3 + 1] -= 0.015 + Math.sin(t + snowPhases[i]) * 0.003;
        positions[i * 3]     += Math.sin(t * 0.5 + snowPhases[i]) * 0.003;
        if (positions[i * 3 + 1] < -1) {
          positions[i * 3 + 1] = 22;
          positions[i * 3]     = (Math.random() - 0.5) * 40;
        }
      }
      snowGeo.attributes.position.needsUpdate = true;

      // Background stars twinkle
      bgStars.material.opacity = 0.6 + Math.sin(t * 0.3) * 0.2;

      // Gentle tree sway
      treeGroup.rotation.z = Math.sin(t * 0.4) * 0.015;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // ─── Resize ─────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
