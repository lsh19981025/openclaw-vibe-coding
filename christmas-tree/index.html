<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎄 Merry Christmas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #010208; overflow: hidden; }
    canvas { display: block; }
    #title {
      position: fixed; top: 18px; width: 100%; text-align: center;
      color: #ffe066; font-size: 1.3rem; letter-spacing: 5px;
      text-shadow: 0 0 20px #ffa500, 0 0 40px #ff6600;
      pointer-events: none; z-index: 10; font-family: 'Georgia', serif;
    }
    #hint {
      position: fixed; bottom: 16px; width: 100%; text-align: center;
      color: rgba(200,220,255,0.35); font-size: 0.75rem;
      pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="title">🎄 Merry Christmas 🎄</div>
  <div id="hint">🌨️ Drag to rotate · Scroll to zoom</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010208);
    scene.fog = new THREE.FogExp2(0x010208, 0.008);

    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 8, 22);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.6;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 8;
    controls.maxDistance = 50;
    controls.target.set(0, 5, 0);
    controls.update();

    // Ambient light - cool blue for depth
    scene.add(new THREE.AmbientLight(0x1a2a3a, 1.2));

    // Key light - warm from right-front
    const keyLight = new THREE.DirectionalLight(0xfffaee, 1.8);
    keyLight.position.set(8, 12, 10);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 50;
    scene.add(keyLight);

    // Fill light - cool blue from left
    const fillLight = new THREE.DirectionalLight(0x6699ff, 0.6);
    fillLight.position.set(-8, 6, 5);
    scene.add(fillLight);

    // Rim light - backlight for tree silhouette
    const rimLight = new THREE.DirectionalLight(0xffeedd, 0.8);
    rimLight.position.set(0, 8, -10);
    scene.add(rimLight);

    // Top star glow light
    const starGlow = new THREE.PointLight(0xffdd44, 3, 15);
    starGlow.position.set(0, 14.5, 0);
    scene.add(starGlow);

    // === Star topper (5-pointed) ===
    const starMat = new THREE.MeshStandardMaterial({
      color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 5,
      roughness: 0.2, metalness: 0.9
    });
    const starGroup = new THREE.Group();
    const sGeo = new THREE.OctahedronGeometry(0.6, 0);
    const starMesh = new THREE.Mesh(sGeo, starMat);
    starGroup.add(starMesh);
    const crossGeo = new THREE.BoxGeometry(2.4, 0.09, 0.09);
    const cross = new THREE.Mesh(crossGeo, starMat);
    starGroup.add(cross);
    const cross2 = cross.clone();
    cross2.rotation.y = Math.PI / 2;
    starGroup.add(cross2);
    starGroup.position.y = 14;
    scene.add(starGroup);

    // === Tree ===
    const tree = new THREE.Group();

    // Trunk
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.9, metalness: 0.1 });
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.5, 2.0, 14), trunkMat);
    trunk.position.y = 1.0;
    trunk.castShadow = true;
    tree.add(trunk);

    // Tree layers - 7 layers with varying cone sizes
    const treeMats = [
      new THREE.MeshStandardMaterial({ color: 0x1a5c1a, roughness: 0.92, side: THREE.DoubleSide }),
      new THREE.MeshStandardMaterial({ color: 0x2d7a2d, roughness: 0.92, side: THREE.DoubleSide }),
      new THREE.MeshStandardMaterial({ color: 0x3d8b3d, roughness: 0.92, side: THREE.DoubleSide }),
      new THREE.MeshStandardMaterial({ color: 0x2d7a2d, roughness: 0.92, side: THREE.DoubleSide }),
      new THREE.MeshStandardMaterial({ color: 0x1a5c1a, roughness: 0.92, side: THREE.DoubleSide }),
      new THREE.MeshStandardMaterial({ color: 0x3d8b3d, roughness: 0.92, side: THREE.DoubleSide }),
      new THREE.MeshStandardMaterial({ color: 0x2d7a2d, roughness: 0.92, side: THREE.DoubleSide }),
    ];

    const layers = [
      { r: 4.0, h: 4.0, y: 3.0 },
      { r: 3.2, h: 3.6, y: 6.2 },
      { r: 2.5, h: 3.0, y: 8.9 },
      { r: 1.9, h: 2.6, y: 11.2 },
      { r: 1.3, h: 2.0, y: 13.0 },
      { r: 0.8, h: 1.4, y: 14.3 },
      { r: 0.4, h: 0.9, y: 15.2 },
    ];

    layers.forEach((l, i) => {
      const offset = i % 2 === 0 ? 0 : 0.15;
      const cone = new THREE.Mesh(new THREE.ConeGeometry(l.r, l.h, 20), treeMats[i]);
      cone.position.y = l.y + offset;
      cone.position.z = offset * 0.3;
      cone.castShadow = true;
      tree.add(cone);

      // Snow caps
      const snowCap = new THREE.Mesh(
        new THREE.SphereGeometry(1, 12, 8, 0, Math.PI * 2, 0, Math.PI * 0.35),
        new THREE.MeshStandardMaterial({ color: 0xe8f4ff, roughness: 0.5, transparent: true, opacity: 0.92 })
      );
      snowCap.scale.set(l.r * 1.3, l.r * 0.35, l.r * 1.3);
      snowCap.position.y = l.y + l.h * 0.45 + 0.1;
      tree.add(snowCap);
    });

    // === Hanging branches (drooping) ===
    const branchMat = new THREE.MeshStandardMaterial({ color: 0x1a4c1a, roughness: 0.9 });
    const branchPositions = [
      [2.5, 4, 1], [-2.2, 4.2, 1.2], [1, 3.8, -2.5], [-1.5, 4.5, -2],
      [3, 5.5, 0.5], [-2.8, 5.8, 0.8], [2, 6.5, -1.5], [-1.8, 6.8, 1.2],
      [1.5, 7.5, 2], [-1.2, 7.8, -1.8], [0.8, 8.5, 1.5], [-0.6, 9, -1.2],
      [1, 10, 0.8], [-0.8, 10.5, 0.5],
    ];
    branchPositions.forEach(([x, y, z]) => {
      const branch = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.06, 1.5 + Math.random() * 0.5, 6),
        branchMat
      );
      branch.position.set(x, y, z);
      branch.rotation.z = (Math.random() - 0.5) * 0.6;
      branch.rotation.x = (Math.random() - 0.5) * 0.4;
      tree.add(branch);
    });

    // === Colorful ornament balls ===
    const ballCols = [0xff4444, 0x4488ff, 0xffdd00, 0xcc44ff, 0x00ccff, 0xff8844, 0x44ff88];
    const ballMats = ballCols.map(c => new THREE.MeshStandardMaterial({
      color: c, emissive: c, emissiveIntensity: 0.4,
      roughness: 0.15, metalness: 0.8
    }));

    const ballPositions = [
      [2.5, 3.5, 1.5], [-2.3, 3.8, 1.2], [1.2, 3.2, 2.8], [-1.8, 4, 2.5],
      [3, 3.8, -0.8], [-2.8, 3.5, -1], [0.5, 3.0, 3.2], [-0.8, 4.2, 2.8],
      [2.8, 4.5, 0.5], [-2.5, 4.8, 0.3],
      [1.8, 6.5, 1.5], [-1.5, 6.8, 1.8], [0.8, 6.2, 2.5], [-1.2, 7, -1.8],
      [2.2, 6.8, -1.2], [-1.8, 6.5, 0.5],
      [1.3, 9.2, 1.2], [-1.0, 9.5, 1.0], [0.5, 8.9, 2.0], [-0.8, 9.8, -1.0],
      [1.5, 9.0, -1.5], [-1.2, 9.3, 0.8],
      [0.9, 11.5, 0.8], [-0.7, 11.8, 0.6], [0.4, 11.2, 1.5], [-0.5, 12, -0.5],
      [1.0, 11.3, -1.0], [-0.8, 11.6, 0.9],
      [0.5, 13.3, 0.5], [-0.4, 13.5, 0.4], [0.3, 13.1, 1.0], [-0.3, 13.7, -0.3],
      [0.3, 14.5, 0.3], [-0.2, 14.6, 0.2],
    ];

    const balls = [];
    ballPositions.forEach(([x, y, z], i) => {
      const r = 0.12 + Math.random() * 0.1;
      const ball = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 10), ballMats[i % ballMats.length].clone());
      ball.position.set(x + (Math.random() - 0.5) * 0.3, y + (Math.random() - 0.5) * 0.2, z + (Math.random() - 0.5) * 0.3);
      ball.castShadow = true;
      balls.push(ball);
      tree.add(ball);
    });

    // === Twinkling lights string ===
    const lightBulbCols = [0xffffaa, 0xffffee, 0xaaffee, 0xffaaff, 0xaabbff];
    const lightBulbs = [];

    for (let layer = 0; layer < 6; layer++) {
      const yBase = 3.5 + layer * 1.8;
      const rBase = 2.8 - layer * 0.4;
      const count = 8 + layer * 4;
      for (let j = 0; j < count; j++) {
        const angle = (j / count) * Math.PI * 2 + layer * 0.5;
        const r = rBase + (Math.random() - 0.5) * 0.3;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        const y = yBase + (Math.random() - 0.5) * 0.5;
        const col = lightBulbCols[Math.floor(Math.random() * lightBulbCols.length)];
        const bulbMat = new THREE.MeshStandardMaterial({
          color: col, emissive: col, emissiveIntensity: 3.0,
          transparent: true, opacity: 0.9
        });
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), bulbMat);
        bulb.position.set(x, y, z);
        lightBulbs.push({ bulb, baseIntensity: 3.0, phase: Math.random() * Math.PI * 2 });
        tree.add(bulb);
      }
    }

    // === Gift boxes at base ===
    const giftData = [
      { x: -1.2, z: 0.8, s: 0.5, col: 0xcc2222, rib: 0xffdd00 },
      { x: 1.5, z: 1.0, s: 0.4, col: 0x2255cc, rib: 0xff88ff },
      { x: -0.3, z: 1.5, s: 0.6, col: 0x228844, rib: 0xffdd44 },
      { x: 2.0, z: 0.5, s: 0.35, col: 0x882288, rib: 0x88ffff },
      { x: -1.8, z: 0.3, s: 0.45, col: 0xdd8822, rib: 0xffffff },
    ];
    giftData.forEach(g => {
      const boxMat = new THREE.MeshStandardMaterial({ color: g.col, roughness: 0.7 });
      const box = new THREE.Mesh(new THREE.BoxGeometry(g.s, g.s, g.s), boxMat);
      box.position.set(g.x, g.s / 2, g.z);
      box.castShadow = true;
      tree.add(box);
      const ribMat = new THREE.MeshStandardMaterial({ color: g.rib, metalness: 0.6, roughness: 0.3 });
      const ribH = new THREE.Mesh(new THREE.BoxGeometry(g.s + 0.01, g.s * 0.12, g.s * 0.12), ribMat);
      ribH.position.set(g.x, g.s / 2 + 0.01, g.z);
      tree.add(ribH);
      const ribV = new THREE.Mesh(new THREE.BoxGeometry(g.s * 0.12, g.s * 0.12, g.s + 0.01), ribMat);
      ribV.position.set(g.x, g.s / 2 + 0.01, g.z);
      tree.add(ribV);
      const bow = new THREE.Mesh(new THREE.SphereGeometry(g.s * 0.15, 8, 8), ribMat);
      bow.position.set(g.x, g.s + g.s * 0.1, g.z);
      tree.add(bow);
    });

    // === Ground snow ===
    const snowMat = new THREE.MeshStandardMaterial({ color: 0xe8f4ff, roughness: 0.5, transparent: true, opacity: 0.92 });
    const ground = new THREE.Mesh(new THREE.CylinderGeometry(10, 10, 0.15, 40), snowMat);
    ground.position.y = -0.08;
    ground.receiveShadow = true;
    scene.add(ground);

    // Snow mounds
    for (let i = 0; i < 16; i++) {
      const angle = (i / 16) * Math.PI * 2;
      const r = 4 + Math.random() * 5;
      const mound = new THREE.Mesh(new THREE.SphereGeometry(0.6 + Math.random() * 0.7, 12, 12), snowMat.clone());
      mound.scale.y = 0.38;
      mound.position.set(Math.cos(angle) * r, 0.12, Math.sin(angle) * r);
      mound.receiveShadow = true;
      scene.add(mound);
    }

    // === Background stars ===
    const bgGeo = new THREE.BufferGeometry();
    const bgPos = new Float32Array(2500 * 3);
    for (let i = 0; i < 2500; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 100 + Math.random() * 30;
      bgPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      bgPos[i*3+1] = Math.abs(r * Math.cos(phi)) * 0.5 + 10;
      bgPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    }
    bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
    scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({
      color: 0xffffff, size: 0.4, transparent: true, opacity: 0.85
    })));

    // === Snowflakes ===
    const SNOW = 5000;
    const snowGeo2 = new THREE.BufferGeometry();
    const snowPos = new Float32Array(SNOW * 3);
    const snowPh = new Float32Array(SNOW);
    for (let i = 0; i < SNOW; i++) {
      snowPos[i*3]   = (Math.random() - 0.5) * 60;
      snowPos[i*3+1] = Math.random() * 35;
      snowPos[i*3+2] = (Math.random() - 0.5) * 60;
      snowPh[i] = Math.random() * Math.PI * 2;
    }
    snowGeo2.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
    scene.add(new THREE.Points(snowGeo2, new THREE.PointsMaterial({
      color: 0xdeeeff, size: 0.15, transparent: true, opacity: 0.8,
      sizeAttenuation: true, depthWrite: false
    })));

    scene.add(tree);

    // === Animation ===
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      starGroup.rotation.y += 0.008;
      starGlow.intensity = 3 + Math.sin(t * 2) * 1.5;
      starMat.emissiveIntensity = 5 + Math.sin(t * 3) * 2;

      tree.rotation.z = Math.sin(t * 0.3) * 0.03;

      balls.forEach((b, i) => {
        b.material.emissiveIntensity = 0.4 + Math.sin(t * 3 + i * 0.5 + b.position.y * 0.5) * 0.6;
      });

      lightBulbs.forEach(({ bulb, baseIntensity, phase }, i) => {
        bulb.material.emissiveIntensity = baseIntensity * (0.6 + Math.sin(t * 4 + phase) * 0.4);
      });

      const pos = snowGeo2.attributes.position.array;
      for (let i = 0; i < SNOW; i++) {
        pos[i*3+1] -= 0.014 + Math.sin(t * 0.4 + snowPh[i]) * 0.005;
        pos[i*3]   += Math.sin(t * 0.3 + snowPh[i]) * 0.004;
        if (pos[i*3+1] < -1) {
          pos[i*3+1] = 32;
          pos[i*3]   = (Math.random() - 0.5) * 60;
          pos[i*3+2] = (Math.random() - 0.5) * 60;
        }
      }
      snowGeo2.attributes.position.needsUpdate = true;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
